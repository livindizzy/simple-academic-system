server:
  port: 8086

spring:
  application:
    name: simple-academic-service

  datasource:
    url: jdbc:postgresql://localhost:5432/SIMPLE_ACADEMIC
    username: postgres
    password: t1ger

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  jwt:
    secret-key: "092cc244-aea7-4bf3-a075-1f372baeed71"
    expiration: 300000  #5 Menit
default:
  page:
    size: 10
    number: 0
    sortBy: id
    sortType: ASC
